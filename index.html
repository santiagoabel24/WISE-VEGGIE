<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wise Veggie - Iniciar Sesión</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


  <div class="background-overlay"></div>

  <main class="container">

    <!-- LOGO -->
    <section class="logo-box">
      <!-- Reemplaza src por tu imagen -->
      <img src="logoWV.png" alt="Logo Wise Veggie" class="logo">
      <h1>WISE VEGGIE</h1>
    </section>

    <!-- FORMULARIO -->
    <section class="login-card">
      <h2>INICIAR SESIÓN</h2>

      <form action="bienvenida.html">
        <input type="text" placeholder="Nombre de Usuario" required>
        <input type="password" placeholder="Contraseña" required>

        <button type="submit">ENTRAR</button>
      </form>

      <p class="extra-text">
        Accede a tu cuenta para continuar en la aplicación.
      </p>

      <a href="Login.html" class="link-create">CREAR CUENTA</a>
    </section>

  </main>

</body>
</html>
