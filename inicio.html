<!-- inicio.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wise Veggie - Inicio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="background-overlay"></div>

  <main class="dashboard">

    <!-- Bienvenida -->
    <section class="card welcome-card">
      <h1>¡Hola de nuevo! 🌱</h1>
      <p>Te sugerimos registrar la comida de hoy para seguir cuidando tu alimentación.</p>
      <button>Registrar comida</button>
    </section>

    <!-- Calendario -->
    <section class="card calendar-card">
      <h2>Registros anteriores</h2>

      <div class="calendar-grid">
        <div>1</div><div>2</div><div>3</div><div>4</div><div>5</div>
        <div>6</div><div>7</div><div>8</div><div>9</div><div>10</div>
        <div>11</div><div>12</div><div>13</div><div>14</div><div>15</div>
        <div>16</div><div>17</div><div>18</div><div>19</div><div>20</div>
        <div>21</div><div>22</div><div>23</div><div>24</div><div>25</div>
        <div>26</div><div>27</div><div>28</div><div>29</div><div>30</div>
      </div>
    </section>

    <!-- Grafica -->
    <section class="card chart-card">
      <h2>Plato del Buen Comer</h2>

      <div class="circle-chart"></div>

      <div class="legend">
        <p>🥬 Verduras y frutas</p>
        <p>🌾 Cereales</p>
        <p>🫘 Leguminosas</p>
        <p>🍗 Origen animal</p>
      </div>
    </section>

  </main>

</body>
</html>
