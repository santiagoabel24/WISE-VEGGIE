<!-- crear-cuenta.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wise Veggie - Crear Cuenta</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="background-overlay"></div>

  <main class="container">

    <!-- PANEL IZQUIERDO -->
    <section class="logo-box">
      <!-- Cambia por tu logo -->
      <img src="logoWV.png" alt="Logo Wise Veggie" class="logo">
      <h1>WISE VEGGIE</h1>
      <p>Únete y comienza una experiencia saludable.</p>
    </section>

    <!-- FORMULARIO -->
    <section class="register-card">
      <h2>CREAR CUENTA</h2>

      <form action="bienvenida.html">
        <input type="text" placeholder="Nombre de Usuario" required>
        <input type="email" placeholder="Correo Electrónico" required>
        <input type="number" placeholder="Edad" required>
        <input type="text" placeholder="Estatura" required>
        <select required>
          <option value="">Género</option>
          <option>Masculino</option>
          <option>Femenino</option>
          <option>Prefiero no decirlo</option>
        </select>
        <input type="password" placeholder="Contraseña" required>
        <input type="password" placeholder="Confirmar Contraseña" required>

        <button type="submit">CREAR CUENTA</button>
      </form>

      <a href="index.html" class="login-link">INICIAR SESIÓN</a>
    </section>

  </main>

</body>
</html>
